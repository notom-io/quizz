<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classement — Quiz</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f0f1a;
    color: #fff;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  h1 {
    text-align: center;
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-bottom: 0.3rem;
    background: linear-gradient(90deg, #f5c542, #ff6b6b, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    text-align: center;
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 2.5rem;
  }

  .refresh-info {
    text-align: center;
    font-size: 0.8rem;
    color: #555;
    margin-bottom: 2rem;
  }

  /* PODIUM */
  .podium-wrapper {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 1rem;
    margin-bottom: 3rem;
    padding: 0 1rem;
  }

  .podium-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }

  .podium-avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    font-weight: 700;
    flex-shrink: 0;
  }

  .podium-name {
    font-size: 0.95rem;
    font-weight: 600;
    text-align: center;
    max-width: 110px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .podium-score {
    font-size: 1.1rem;
    font-weight: 700;
  }

  .podium-block {
    border-radius: 10px 10px 0 0;
    width: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    font-weight: 800;
  }

  .p1 .podium-avatar { background: #f5c54222; border: 2px solid #f5c542; color: #f5c542; }
  .p1 .podium-block  { background: linear-gradient(180deg, #f5c542 0%, #c9952e 100%); height: 130px; }
  .p1 .podium-score  { color: #f5c542; }

  .p2 .podium-avatar { background: #d1d5db22; border: 2px solid #d1d5db; color: #d1d5db; }
  .p2 .podium-block  { background: linear-gradient(180deg, #9ca3af 0%, #6b7280 100%); height: 95px; }
  .p2 .podium-score  { color: #d1d5db; }

  .p3 .podium-avatar { background: #cd7f3222; border: 2px solid #cd7f32; color: #cd7f32; }
  .p3 .podium-block  { background: linear-gradient(180deg, #cd7f32 0%, #9a5f22 100%); height: 70px; }
  .p3 .podium-score  { color: #cd7f32; }

  /* TABLE */
  .table-wrapper {
    max-width: 900px;
    margin: 0 auto;
    overflow-x: auto;
    border-radius: 12px;
    border: 1px solid #ffffff15;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
  }

  thead tr {
    background: #ffffff0a;
  }

  th {
    padding: 0.75rem 1rem;
    text-align: left;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: #888;
    text-transform: uppercase;
    border-bottom: 1px solid #ffffff10;
  }

  th:not(:first-child) { text-align: center; }

  tbody tr {
    border-bottom: 1px solid #ffffff08;
    transition: background 0.15s;
  }

  tbody tr:hover { background: #ffffff05; }

  tbody tr:last-child { border-bottom: none; }

  td {
    padding: 0.7rem 1rem;
    color: #e0e0e0;
  }

  td:not(:first-child):not(:nth-child(2)) { text-align: center; color: #aaa; }

  .rank { font-weight: 700; color: #666; width: 40px; }
  .rank-1 { color: #f5c542; }
  .rank-2 { color: #d1d5db; }
  .rank-3 { color: #cd7f32; }

  .team-name { font-weight: 600; }

  .total-score {
    font-weight: 700;
    color: #fff;
    font-size: 1rem;
    text-align: center !important;
  }

  .loading {
    text-align: center;
    padding: 3rem;
    color: #555;
    font-size: 1rem;
  }

  .error {
    text-align: center;
    padding: 2rem;
    color: #ff6b6b;
    font-size: 0.9rem;
    background: #ff6b6b11;
    border-radius: 8px;
    margin: 1rem auto;
    max-width: 600px;
  }

  .countdown {
    display: inline-block;
    background: #ffffff0a;
    border: 1px solid #ffffff10;
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.78rem;
    color: #666;
    margin-top: 0.5rem;
  }

  .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #22c55e;
    margin-right: 6px;
    animation: pulse 1.5s infinite;
    vertical-align: middle;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>

<h1>🏆 Classement</h1>
<div class="subtitle">Mis à jour en temps réel</div>

<div id="podium" class="podium-wrapper"></div>

<div class="table-wrapper">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Équipe</th>
        <th>Total</th>
        <th>Quiz 1</th>
        <th>Quiz 2</th>
        <th>Quiz 3</th>
        <th>Enigma 1</th>
        <th>Enigma 2</th>
        <th>Enigma 3</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="9" class="loading">Chargement…</td></tr>
    </tbody>
  </table>
</div>

<div class="refresh-info">
  <span class="dot"></span>Rafraîchissement automatique toutes les 30 secondes
  <br><span class="countdown" id="countdown">Prochain dans 30s</span>
</div>

<script>
const SHEET_ID = '1joMxlzHnCndT9mRKT4ZeRHeGWz9wQm5Yc57iwkF0xGk';
const SHEET_NAME = 'Classement';
const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

let countdown = 30;

function fetchData() {
  fetch(URL)
    .then(r => r.text())
    .then(text => {
      const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
      const rows = json.table.rows;

      // Colonnes: A=NOM, B=TOTAL, C=Quiz1, D=Quiz2, E=Quiz3, F=Enigma1, G=Enigma2, H=Enigma3
      const data = rows
        .map(r => ({
          nom:     r.c[0]?.v || '',
          total:   r.c[1]?.v || 0,
          quiz1:   r.c[2]?.v || 0,
          quiz2:   r.c[3]?.v || 0,
          quiz3:   r.c[4]?.v || 0,
          enigma1: r.c[5]?.v || 0,
          enigma2: r.c[6]?.v || 0,
          enigma3: r.c[7]?.v || 0,
        }))
        .filter(r => r.nom && r.nom.trim() !== '')
        .sort((a, b) => b.total - a.total);

      renderPodium(data);
      renderTable(data);
    })
    .catch(err => {
      document.getElementById('tbody').innerHTML = `<tr><td colspan="9" class="error">Erreur de chargement. Vérifiez que le Sheet est public.<br><small>${err}</small></td></tr>`;
    });
}

function renderPodium(data) {
  const top3 = [data[1], data[0], data[2]]; // ordre: 2ème, 1er, 3ème
  const classes = ['p2', 'p1', 'p3'];
  const medals = ['🥈', '🥇', '🥉'];
  const ranks = [2, 1, 3];

  const podium = document.getElementById('podium');
  podium.innerHTML = top3.map((p, i) => {
    if (!p) return '';
    const initials = p.nom.slice(0, 2).toUpperCase();
    return `
      <div class="podium-item ${classes[i]}">
        <div class="podium-avatar">${initials}</div>
        <div class="podium-name">${p.nom}</div>
        <div class="podium-score">${p.total} pts</div>
        <div class="podium-block">${medals[i]}</div>
      </div>`;
  }).join('');
}

function renderTable(data) {
  const tbody = document.getElementById('tbody');
  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" class="loading">Aucune donnée pour l\'instant…</td></tr>';
    return;
  }
  tbody.innerHTML = data.map((r, i) => {
    const rank = i + 1;
    const rankClass = rank <= 3 ? `rank-${rank}` : '';
    const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
    return `
      <tr>
        <td class="rank ${rankClass}">${medal}</td>
        <td class="team-name">${r.nom}</td>
        <td class="total-score">${r.total}</td>
        <td>${r.quiz1}</td>
        <td>${r.quiz2}</td>
        <td>${r.quiz3}</td>
        <td>${r.enigma1}</td>
        <td>${r.enigma2}</td>
        <td>${r.enigma3}</td>
      </tr>`;
  }).join('');
}

function tick() {
  countdown--;
  document.getElementById('countdown').textContent = `Prochain dans ${countdown}s`;
  if (countdown <= 0) {
    countdown = 30;
    fetchData();
  }
}

fetchData();
setInterval(tick, 1000);
</script>
</body>
</html>
